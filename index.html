<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f5f7"><title>Nuestro Espacio · v7.0.2</title><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="styles.css"></head><body>
<div id="auth" class="auth"><div class="auth-card"><img src="icon-192.png" class="logo"><h1>Nuestro Espacio</h1><p>Tu hogar, sincronizado y en orden.</p><div id="authError" class="error"></div><form id="loginForm"><input name="email" type="email" placeholder="Correo electrónico" required><input name="password" type="password" placeholder="Contraseña" required><button>Iniciar sesión</button></form><button class="secondary" id="showRegister">Crear cuenta</button><form id="registerForm" hidden><input name="name" placeholder="Nombre" required><input name="email" type="email" placeholder="Correo" required><input name="password" type="password" minlength="6" placeholder="Contraseña" required><button>Crear cuenta</button><button type="button" class="secondary" id="backLogin">Volver</button></form></div></div>
<div id="setup" class="auth" hidden><div class="auth-card"><h1>Configura tu hogar</h1><form id="createHome"><input name="name" value="Nuestro Espacio" required><button>Crear hogar</button></form><div class="or">o</div><form id="joinHome"><input name="code" placeholder="Código de invitación" required><button class="secondary">Unirme</button></form></div></div>
<div id="loading" class="auth"><div class="auth-card center"><div class="spinner"></div><h2>Preparando tu hogar</h2><p id="loadingText">Conectando con Firebase…</p><button id="loadingLocal" class="secondary" type="button">Abrir copia local</button></div></div>
<div id="app" hidden><header><div><small>NUESTRO ESPACIO</small><h1 id="pageTitle">Mi Hogar</h1></div><div class="header-actions"><button id="syncBtn" class="circle"><span id="syncDot"></span></button><button id="themeBtn" class="circle">◐</button></div></header><main id="view"></main><button id="fab">＋</button><nav id="nav"><button data-view="home" class="active">⌂<span>Inicio</span></button><button data-view="market">🛒<span>Mercado</span></button><button data-view="pantry">▥<span>Despensa</span></button><button data-view="agenda">□<span>Agenda</span></button><button data-view="more">•••<span>Más</span></button></nav></div>
<div id="sheet" class="sheet-backdrop" hidden><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><h2 id="sheetTitle"></h2><button id="sheetClose">×</button></div><div id="sheetBody"></div></div></div><div id="toast"></div><script>
window.__NE_BOOT_DEADLINE=setTimeout(()=>{
  const loading=document.getElementById('loading');
  if(loading && !loading.hidden){
    document.getElementById('loadingText').textContent='La conexión está tardando. Puedes abrir tu copia local o volver a intentar.';
  }
},8000);
document.getElementById('loadingLocal').onclick=()=>{
  document.getElementById('loading').hidden=true;
  document.getElementById('auth').hidden=false;
};
</script><script type="module" src="app.js"></script></body></html>
